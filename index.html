<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>음성고 인공지능 기초 강의 노트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css");

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        /* Hero 배경 그라데이션 */
        .hero-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }

        /* 스크롤 시 특정 위치부터 상단 고정되는 네비게이션 */
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* 섹션 카드 */
        .section-card {
            background: white;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            border: 1px solid #cbd5e1; /* 섹션 카드 기본 테두리 */
            transition: all 0.3s ease;
        }

        /* 섹션 카드 hover */
        .section-card:hover {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* =========================================
           공통 링크 카드 스타일 (CSS 변수 활용)
           ========================================= */
        /* 링크 카드 */
        .link-card {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            transition: all 0.2s ease-in-out;
            text-decoration: none;
        }

        /* 링크 카드 hover */
        .link-card:hover {
            transform: translateY(-0.25rem);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.1);
            border-color: var(--theme-border, #7c3aed); /* hover 시 강조 색상 */
        }

        /* 카드 안의 작은 원형 불릿 */
        .link-card div {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background-color: #cbd5e1;
            margin-right: 0.75rem;
            transition: all 0.2s;
        }

        .link-card:hover div {
            background-color: var(--theme-color, #a855f7);
            transform: scale(1.25);
        }

        /* 카드 안의 텍스트 */
        .link-card span {
            font-weight: 500;
            color: #334155;
            transition: color 0.2s;
        }

        .link-card:hover span {
            color: var(--theme-text, #7e22ce);
        }

        /* --- 테마별 색상 설정 --- */
        .theme-purple {
            --theme-border: #d8b4fe; /* tailwind: purple-300 */
            --theme-color: #a855f7; /* tailwind: purple-500 */
            --theme-text: #7e22ce; /* tailwind: purple-700 */
        }

        .theme-blue {
            --theme-border: #93c5fd; /* tailwind: blue-300 */
            --theme-color: #3b82f6; /* tailwind: blue-500 */
            --theme-text: #1d4ed8; /* tailwind: blue-700 */
        }

        .theme-orange {
            --theme-border: #fdba74; /* tailwind: orange-300 */
            --theme-color: #f97316; /* tailwind: orange-500 */
            --theme-text: #c2410c; /* tailwind: orange-700 */
        }

        /* =========================================
           실습 버튼 전용 스타일 (감각적인 다중 그라데이션)
           ========================================= */
        .practice-link {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 1.5rem;
            border-radius: 1rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            z-index: 1;
        }

        /* 상단에 은은한 빛 반사 효과 (Glass 느낌) */
        .practice-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0));
            z-index: -1;
            border-radius: 1rem 1rem 0 0;
        }

        /* Hover 시 입체감 극대화 및 밝기 증가 */
        .practice-link:hover {
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
            transform: translateY(-0.25rem) scale(1.02);
            filter: brightness(1.1);
        }

        /* 버튼 내 텍스트 및 아이콘 정렬 */
        .practice-link span {
            position: relative;
            z-index: 2;
        }

        .practice-link i {
            width: 1.2em;
            margin-right: 0.5rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* --- 🎨 매력적인 6가지 그라데이션 프리셋 --- */
        /* 퍼플 ↔ 핑크 */
        .grad-purple {
            background: linear-gradient(135deg, #a855f7, #ec4899);
        }

        /* 블루 ↔ 퍼플 */
        .grad-blue {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        /* 에메랄드 ↔ 스카이 */
        .grad-emerald {
            background: linear-gradient(135deg, #10b981, #0ea5e9);
        }

        /* 오렌지 ↔ 로즈 */
        .grad-orange {
            background: linear-gradient(135deg, #f97316, #f43f5e);
        }

        /* 핑크 ↔ 로즈 */
        .grad-pink {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
        }

        /* 틸(청록) ↔ 블루 */
        .grad-teal {
            background: linear-gradient(135deg, #14b8a6, #3b82f6);
        }

        /* 라임 ↔ 에메랄드 */
        .grad-lime {
            background: linear-gradient(135deg, #84cc16, #10b981);
        }

        /* 로즈 ↔ 퍼플 */
        .grad-rose {
            background: linear-gradient(135deg, #f43f5e, #a855f7);
        }

        /* 인디고 ↔ 바이올렛 */
        .grad-indigo {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
        }

        /* 스카이 ↔ 블루 */
        .grad-sky {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        }

        /* 앰버 ↔ 오렌지 */
        .grad-amber {
            background: linear-gradient(135deg, #f59e0b, #f97316);
        }

        /* 바이올렛 ↔ 푸시아 (강한 대비, 시각적 강조용) */
        .grad-violet {
            background: linear-gradient(135deg, #7c3aed, #d946ef);
        }

        /* 시안 ↔ 인디고 (차가운 기술 느낌, AI/데이터 페이지에 적합) */
        .grad-cyan {
            background: linear-gradient(135deg, #06b6d4, #6366f1);
        }

        /* 옐로우 ↔ 앰버 (밝고 에너지 있는 버튼) */
        .grad-yellow {
            background: linear-gradient(135deg, #facc15, #f59e0b);
        }

        /* 민트 ↔ 틸 (차분하고 깔끔한 녹색 톤) */
        .grad-mint {
            background: linear-gradient(135deg, #34d399, #14b8a6);
        }

        /* 코랄 ↔ 핑크 (부드러운 따뜻한 강조색) */
        .grad-coral {
            background: linear-gradient(135deg, #fb7185, #ec4899);
        }

        /* 블루 ↔ 시안 (시원한 바다 느낌, 기술 콘텐츠에 적합) */
        .grad-ocean {
            background: linear-gradient(135deg, #2563eb, #06b6d4);
        }

        /* 플럼 ↔ 퍼플 (깊이 있는 보라 계열) */
        .grad-plum {
            background: linear-gradient(135deg, #7e22ce, #a855f7);
        }

        /* 라임 ↔ 옐로우 (밝고 경쾌한 학습 버튼) */
        .grad-spring {
            background: linear-gradient(135deg, #a3e635, #facc15);
        }

    </style>
</head>
<body class="text-slate-900">

</main>

<button class="fixed bottom-8 right-8 w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center shadow-2xl hover:bg-indigo-600 hover:-translate-y-1 transition-all duration-300 z-50 opacity-0 pointer-events-none"
        id="scrollTopBtn"
        title="위로 가기">
    <i class="fa-solid fa-arrow-up text-lg"></i>
</button>

<footer class="bg-slate-900 py-16 px-6 text-center flex flex-col items-center">
    <p class="text-white font-black text-2xl mb-6">Computer Science</p>

    <a class="inline-flex items-center justify-center w-12 h-12 bg-slate-800 text-slate-300 rounded-full hover:bg-white hover:text-slate-900 hover:-translate-y-1 transition-all duration-300 shadow-lg mb-6"

       title="GitHub Repository">

    <p class="text-slate-400">&copy; 음성고등학교 이승진<br>
        Hosted on GitHub Pages.</p>
</footer>

<script>
    // 위로 가기 버튼 로직
    const topBtn = document.getElementById("scrollTopBtn");

    window.onscroll = function () {
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            topBtn.classList.remove("opacity-0", "pointer-events-none");
            topBtn.classList.add("opacity-100", "pointer-events-auto");
        } else {
            topBtn.classList.add("opacity-0", "pointer-events-none");
            topBtn.classList.remove("opacity-100", "pointer-events-auto");
        }
    };

    topBtn.onclick = function () {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    };

    // 모든 학습 링크 새 탭에서 열기
    document.querySelectorAll("a[href*='.html']").forEach(a => a.target = "_blank");
</script>

</html>
